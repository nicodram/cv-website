<!-- Di dalam <header class="hero">, tambahkan SVG ini di atas <h1> -->
<div class="cyber-esg-graphic">
  <!-- SVG Cyberpunk + ESG: Circuit Leaf -->
  <svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
      </filter>
    </defs>
    <!-- Circuit Leaf Path -->
    <path d="M 250 180 L 250 100 M 250 100 C 150 80, 80 140, 50 180 M 250 100 C 350 80, 420 140, 450 180 M 250 100 C 200 50, 150 80, 100 100 M 250 100 C 300 50, 350 80, 400 100" 
          stroke="var(--accent)" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Circuit Nodes -->
    <circle cx="250" cy="100" r="6" fill="var(--text-light)" filter="url(#glow)"/>
    <circle cx="50" cy="180" r="4" fill="var(--accent)"/>
    <circle cx="450" cy="180" r="4" fill="var(--accent)"/>
    <circle cx="100" cy="100" r="4" fill="var(--accent)"/>
    <circle cx="400" cy="100" r="4" fill="var(--accent)"/>
    <!-- Digital Data Lines -->
    <path d="M 50 180 L 100 100 L 250 100 L 400 100 L 450 180" stroke="var(--secondary)" stroke-width="1" stroke-dasharray="4 4" fill="none" opacity="0.5"/>
  </svg>
</div>
